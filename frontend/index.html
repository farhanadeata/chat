<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IF-Bara — Informatika UNBARA</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="d-flex vh-100">
    <aside
      id="sidebarMenu"
      class="offcanvas-md offcanvas-start w-25 flex-column py-3"
      style="--bs-offcanvas-width: 280px"
    >
      <div class="px-3 mb-4 d-flex justify-content-between align-items-center">
        <h5 class="fw-bold m-0 small text-white">Riwayat Diskusi</h5>
        <div class="btn-group">
          <button id="newChatBtn" class="btn btn-sm btn-light text-primary">
            ＋
          </button>
          <button id="deleteChatBtn" class="btn btn-sm btn-light text-danger">
            🗑
          </button>
        </div>
      </div>
      <ul id="chatList" class="list-unstyled flex-grow-1 overflow-auto"></ul>
    </aside>

    <main
      class="flex-grow-1 d-flex flex-column chat-main p-3 p-md-4 h-100 overflow-hidden"
    >
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center gap-2">
          <button
            class="btn btn-outline-secondary d-md-none rounded-circle p-2"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#sidebarMenu"
            style="width: 40px; height: 40px"
          >
            ☰
          </button>
          <h4 class="fw-bold m-0 fs-5">
            <span style="color: #6a11cb">🤖 IF-Bara</span>
          </h4>
        </div>
        <button
          id="toggleVoiceBotBtn"
          class="btn btn-outline-secondary btn-sm rounded-pill px-3"
        >
          🔇 Audio: OFF
        </button>
      </div>

      <div id="chatContainer" class="border flex-grow-1 mb-3 shadow-sm"></div>

      <div class="template-wrapper">
        <button
          class="btn btn-template"
          onclick="useTemplate('Dimana lokasi kampus UNBARA?')"
        >
          📍 Lokasi
        </button>
        <button
          class="btn btn-template"
          onclick="useTemplate('Apa saja daftar prodi di UNBARA?')"
        >
          🎓 Daftar Prodi
        </button>
        <button
          class="btn btn-template"
          onclick="useTemplate('Berapa biaya kuliah di UNBARA?')"
        >
          💰 Biaya
        </button>
        <button
          class="btn btn-template"
          onclick="useTemplate('Bagaimana cara mendaftar?')"
        >
          📝 PMB
        </button>
      </div>

      <form
        id="chatForm"
        class="d-flex gap-2 bg-white p-2 rounded-pill shadow-sm border align-items-center"
      >
        <input
          id="userInput"
          type="text"
          class="form-control border-0 ps-3"
          placeholder="Tanyakan sesuatu..."
        />
        <div class="d-flex gap-1 pe-1">
          <button
            type="button"
            id="toggleVoiceUserBtn"
            class="btn btn-voice rounded-circle"
            style="width: 38px; height: 38px"
          >
            🎤
          </button>
          <button type="submit" class="btn btn-primary rounded-pill px-4">
            Kirim
          </button>
        </div>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
